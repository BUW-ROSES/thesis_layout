# This workflow will run a docker image with a full TeXLive environment installed and compile the thesis to look for errors

name: Document Build

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Opt actions/checkout and actions/upload-artifact (still on Node 20) into Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Permissions needed by softprops/action-gh-release to create/update the rolling release.
    permissions:
      contents: write

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Compile the thesis
      - name: Compile thesis
        uses: xu-cheng/latex-action@v3
        with:
          root_file: thesis.tex
          latexmk_shell_escape: true # necessary for minted package
          docker_image: ghcr.io/chearix/vscode-devcontainer-latex:main

      # Publish the built PDF as a workflow artifact (90-day retention, useful for PR builds)
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: thesis
          path: thesis.pdf
          if-no-files-found: error

      # Update the rolling "latest" release with the freshly built PDF.
      # Stable URL: https://github.com/<owner>/<repo>/releases/latest/download/thesis.pdf
      - name: Update "latest" release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Latest build of `main`, automatically updated on every push.
            Commit: ${{ github.sha }}
          files: thesis.pdf
          make_latest: true
          prerelease: false